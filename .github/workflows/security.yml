name: Security

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: ["main"]
    
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly published advisories
    - cron: "0 8 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Vulnerability audit (RustSec advisory database) ─────────────────────── #
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        run: cargo audit

  # ── Policy enforcement: licenses, bans, sources ─────────────────────────── #
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check licenses, bans, advisories, and sources
        run: cargo deny check

  # ── Outdated dependency report ───────────────────────────────────────────── #
  outdated:
    name: cargo-outdated
    runs-on: ubuntu-latest
    continue-on-error: true   # informational only
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked
      - name: Check for outdated dependencies
        run: cargo outdated --workspace --exit-code 1

  # ── Unused dependency detection ─────────────────────────────────────────── #
  unused:
    name: cargo-machete
    runs-on: ubuntu-latest
    continue-on-error: true   # informational only
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: Detect unused dependencies
        run: cargo machete

  # ── Static analysis with Opengrep ───────────────────────────────────────── #
  opengrep:
    name: Opengrep (SAST)
    runs-on: ubuntu-latest
    continue-on-error: true   # informational only
    steps:
      - uses: actions/checkout@v4
      - name: Install Opengrep
        run: pip install opengrep --quiet
      - name: Run Opengrep on Rust source
        run: |
          opengrep scan \
            --config "p/rust" \
            --sarif \
            --output opengrep-results.sarif \
            . || true
      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: opengrep-results.sarif
        continue-on-error: true
